# TDL test set for NMSE vs. Doppler and NMSE vs. Delay spread
# Same base params as train/val; two modes via doppler_sweep / delay_spread_sweep.

delay_profile: "A"
num_channels_per_group: 10000
random_seed: 456
start_rb: 0
num_rbs: 10
spacing: 15
tx_antenna_count: 1
rx_antenna_count: 1
carrier_freq: 3.5e9
show_progress: true

low_delay_spread: [10, 50, 100, 150, 200, 250, 300]
moderate_delay_spread: [350, 400, 450, 500, 550, 600, 650]
high_delay_spread: [700, 750, 800, 850, 900, 950, 1000]

low_doppler: [10, 50, 100, 150, 200]
moderate_doppler: [250, 300, 350, 400]
high_doppler: [450, 500, 550, 600]
